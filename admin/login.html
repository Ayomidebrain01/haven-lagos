<!DOCTYPE html>
<html lang="en-NG">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Access — HAVEN Lagos</title>
<meta name="robots" content="noindex, nofollow">
<script src="./config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito Sans',sans-serif;background:#0d1526;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,0.4);}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:800;color:#0f2a5e;text-align:center;margin-bottom:4px;}
.logo span{color:#93b8f5;}
.badge{text-align:center;font-size:0.65rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#7a8499;margin-bottom:28px;}
.title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.15rem;font-weight:800;color:#0d1526;text-align:center;margin-bottom:6px;}
.sub{font-size:0.82rem;color:#7a8499;text-align:center;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:700;color:#374159;margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase;}
.field input{width:100%;padding:12px 14px;border:1.5px solid #dde3ee;border-radius:8px;font-family:'Nunito Sans',sans-serif;font-size:0.9rem;color:#0d1526;outline:none;transition:border 0.2s;}
.field input:focus{border-color:#0f2a5e;}
.field input.error{border-color:#dc2626;}
.alert{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:0.8rem;color:#dc2626;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.btn{width:100%;padding:13px;background:#0f2a5e;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:800;letter-spacing:0.05em;cursor:pointer;transition:background 0.2s;margin-top:4px;}
.btn:hover{background:#0a1f47;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;}
.divider hr{flex:1;border:none;border-top:1px solid #dde3ee;}
.divider span{font-size:0.72rem;color:#7a8499;font-weight:600;}
.google-btn{width:100%;padding:11px;background:#fff;color:#374159;border:1.5px solid #dde3ee;border-radius:8px;font-family:'Nunito Sans',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.google-btn:hover{border-color:#0f2a5e;background:#f5f7fb;}
.footer{text-align:center;margin-top:20px;font-size:0.75rem;color:#7a8499;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;margin-right:6px;}
.spinner.show{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">HAVEN<span> Lagos</span></div>
  <div class="badge">Admin Panel</div>
  <div class="title">Staff Access</div>
  <div class="sub">Sign in with your admin credentials</div>

  <div class="alert" id="alert"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="admin@havenshortlets.com" autocomplete="email">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="adminLogin()">
    <span class="spinner" id="spinner"></span>
    <span id="btnText">Sign In to Admin Panel</span>
  </button>

  <div class="divider"><hr><span>or</span><hr></div>

  <button class="google-btn" onclick="googleAdminLogin()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
    Continue with Google
  </button>

  <div class="footer">Access restricted to authorised HAVEN staff only.</div>
</div>

<script>
async function adminLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const alert = document.getElementById('alert');

  if (!email || !password) {
    alert.textContent = 'Please enter your email and password.';
    alert.classList.add('show');
    return;
  }

  document.getElementById('loginBtn').disabled = true;
  document.getElementById('spinner').classList.add('show');
  document.getElementById('btnText').textContent = 'Signing in…';
  alert.classList.remove('show');

  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Login failed');

    // Check if user is admin/staff/concierge
    if (!['admin', 'staff', 'concierge'].includes(data.user.role)) {
      throw new Error('Access denied. Admin credentials required.');
    }

    localStorage.setItem('haven_token', data.accessToken);
    localStorage.setItem('haven_refresh', data.refreshToken);
    localStorage.setItem('haven_user', JSON.stringify(data.user));

    window.location.href = './index.html';
  } catch (err) {
    alert.textContent = '⚠️ ' + err.message;
    alert.classList.add('show');
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('spinner').classList.remove('show');
    document.getElementById('btnText').textContent = 'Sign In to Admin Panel';
  }
}

function googleAdminLogin() {
  // Store that this is an admin login attempt
  sessionStorage.setItem('admin_google_login', '1');
  window.location.href = API_BASE.replace('/api', '') + '/api/auth/google?admin=1';
}

// Handle Google callback
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const refresh = params.get('refresh');
const userStr = params.get('user');

if (token && refresh && userStr) {
  try {
    const user = JSON.parse(decodeURIComponent(userStr));
    if (['admin', 'staff', 'concierge'].includes(user.role)) {
      localStorage.setItem('haven_token', token);
      localStorage.setItem('haven_refresh', refresh);
      localStorage.setItem('haven_user', JSON.stringify(user));
      window.location.href = './index.html';
    } else {
      const alert = document.getElementById('alert');
      alert.textContent = '⚠️ Access denied. Admin credentials required.';
      alert.classList.add('show');
    }
  } catch (err) {
    console.error('Google callback error:', err);
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

// Check if already logged in as admin
const existingUser = JSON.parse(localStorage.getItem('haven_user') || '{}');
if (existingUser.role && ['admin', 'staff', 'concierge'].includes(existingUser.role)) {
  window.location.href = './index.html';
}
</script>
</body>
</html>

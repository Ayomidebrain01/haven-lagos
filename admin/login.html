<!DOCTYPE html>
<html lang="en-NG">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Access — HAVEN Lagos</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito Sans',sans-serif;background:#0d1526;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,0.4);text-align:center;}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:800;color:#0f2a5e;margin-bottom:4px;}
.logo span{color:#93b8f5;}
.badge{font-size:0.62rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#7a8499;margin-bottom:28px;}
.title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:800;color:#0d1526;margin-bottom:6px;}
.sub{font-size:0.8rem;color:#7a8499;margin-bottom:28px;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid #dde3ee;background:#fff;transition:all 0.2s;}
.dot.filled{background:#0f2a5e;border-color:#0f2a5e;}
.dot.error{background:#dc2626;border-color:#dc2626;animation:shake 0.3s ease;}
.dot.success{background:#16a34a;border-color:#16a34a;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.key{padding:16px;border-radius:12px;border:1.5px solid #dde3ee;background:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:1.2rem;font-weight:700;color:#0d1526;cursor:pointer;transition:all 0.15s;user-select:none;}
.key:hover{background:#e8eef9;border-color:#0f2a5e;}
.key:active{transform:scale(0.94);background:#e8eef9;}
.key.zero{grid-column:2;}
.key.del{grid-column:3;font-size:1rem;color:#7a8499;}
.key.del:hover{background:#fef2f2;border-color:#dc2626;color:#dc2626;}
.alert{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:0.8rem;color:#dc2626;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.attempts{font-size:0.72rem;color:#7a8499;margin-top:8px;}
.attempts span{color:#dc2626;font-weight:700;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">HAVEN<span> Lagos</span></div>
  <div class="badge">Admin Panel</div>
  <div class="title">Enter Admin PIN</div>
  <div class="sub">4-digit access code</div>
  <div class="pin-dots">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>
  <div class="alert" id="alert"></div>
  <div class="keypad">
    <button class="key" onclick="pressKey('1')">1</button>
    <button class="key" onclick="pressKey('2')">2</button>
    <button class="key" onclick="pressKey('3')">3</button>
    <button class="key" onclick="pressKey('4')">4</button>
    <button class="key" onclick="pressKey('5')">5</button>
    <button class="key" onclick="pressKey('6')">6</button>
    <button class="key" onclick="pressKey('7')">7</button>
    <button class="key" onclick="pressKey('8')">8</button>
    <button class="key" onclick="pressKey('9')">9</button>
    <button class="key zero" onclick="pressKey('0')">0</button>
    <button class="key del" onclick="deleteKey()">&#9003;</button>
  </div>
  <div class="attempts" id="attemptsText"></div>
</div>

<script>
// ── CHANGE THIS PIN TO WHATEVER YOU WANT ──
const ADMIN_PIN = '1234';
// ──────────────────────────────────────────

// Admin session duration in hours
const SESSION_HOURS = 8;

let pin = '';
let attempts = 0;
const MAX_ATTEMPTS = 5;
let locked = false;

function pressKey(num) {
  if (locked || pin.length >= 4) return;
  pin += num;
  updateDots();
  if (pin.length === 4) setTimeout(checkPin, 150);
}

function deleteKey() {
  if (locked) return;
  pin = pin.slice(0, -1);
  updateDots();
  clearAlert();
}

function updateDots(state) {
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.remove('filled', 'error', 'success');
    if (state === 'error') dot.classList.add('error');
    else if (state === 'success') dot.classList.add('success');
    else if (i <= pin.length) dot.classList.add('filled');
  }
}

function showError(msg) {
  updateDots('error');
  const al = document.getElementById('alert');
  al.textContent = msg;
  al.classList.add('show');
  setTimeout(() => {
    clearAlert();
    pin = '';
    updateDots();
  }, 1200);
}

function clearAlert() {
  const al = document.getElementById('alert');
  al.classList.remove('show');
  al.textContent = '';
}

function checkPin() {
  if (locked) return;

  if (pin === ADMIN_PIN) {
    // Correct PIN
    updateDots('success');
    // Set admin session with expiry
    const expiry = Date.now() + SESSION_HOURS * 60 * 60 * 1000;
    localStorage.setItem('haven_admin_pin', 'verified');
    localStorage.setItem('haven_admin_expiry', expiry.toString());
    localStorage.setItem('haven_user', JSON.stringify({
      first_name: 'Admin',
      last_name: '',
      email: 'admin@havenshortlets.com',
      role: 'admin'
    }));
    setTimeout(() => { window.location.href = './index.html'; }, 500);
  } else {
    attempts++;
    const remaining = MAX_ATTEMPTS - attempts;
    if (attempts >= MAX_ATTEMPTS) {
      locked = true;
      showError('Too many attempts. Locked for 5 minutes.');
      document.getElementById('attemptsText').innerHTML = '<span>Locked for 5 minutes</span>';
      setTimeout(() => {
        locked = false;
        attempts = 0;
        document.getElementById('attemptsText').textContent = '';
        clearAlert();
      }, 5 * 60 * 1000);
      return;
    }
    showError('Wrong PIN. ' + remaining + ' attempt' + (remaining !== 1 ? 's' : '') + ' left.');
    if (remaining <= 2) {
      document.getElementById('attemptsText').innerHTML = '<span>' + remaining + ' attempt' + (remaining !== 1 ? 's' : '') + ' left</span>';
    }
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') pressKey(e.key);
  if (e.key === 'Backspace') deleteKey();
});

// Check existing session
const adminPin = localStorage.getItem('haven_admin_pin');
const adminExpiry = localStorage.getItem('haven_admin_expiry');
if (adminPin === 'verified' && adminExpiry && Date.now() < parseInt(adminExpiry)) {
  window.location.href = './index.html';
}
</script>
</body>
</html>
